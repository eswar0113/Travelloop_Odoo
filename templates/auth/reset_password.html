<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Traveloop</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <link rel="shortcut icon" type="image/x-icon" href="/static/favicon.ico" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .text-sky-500{color:#0ea5e9}.text-sky-600{color:#0284c7}
    .bg-sky-50{background-color:#f0f9ff}.border-sky-200{border-color:#bae6fd}
    .input-field {
      width: 100%;
      border: 1.5px solid #e2e8f0;
      border-radius: 0.875rem;
      padding: 0.75rem 1rem;
      font-size: 0.9375rem;
      color: #1e293b;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .input-field:focus {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
    }
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      color: #fff;
      font-weight: 700;
      border-radius: 0.875rem;
      padding: 0.875rem 1.75rem;
      font-size: 0.9375rem;
      box-shadow: 0 4px 15px rgba(14,165,233,0.4);
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(14,165,233,0.5); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeUp 0.5s ease forwards; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md fade-in">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2.5 mb-8">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-md" style="background:linear-gradient(135deg,#0ea5e9,#6366f1)">
        <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/>
        </svg>
      </div>
      <span class="font-extrabold text-2xl text-slate-800 tracking-tight">Traveloop</span>
    </div>

    <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-8">

      <div class="text-center mb-7">
        <div class="w-14 h-14 bg-sky-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-sky-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-extrabold text-slate-800 mb-1">Set new password</h1>
        <p class="text-slate-500 text-sm">For <span class="font-semibold text-slate-700">{{ email }}</span></p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for category, message in messages %}
      <div class="mb-5 p-4 rounded-xl text-sm font-medium
                  {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200
                  {% else %}bg-sky-50 text-sky-700 border border-sky-200{% endif %}">
        {{ message }}
      </div>
      {% endfor %}{% endif %}
      {% endwith %}

      <form method="POST" class="space-y-5" x-data="{ showPw: false, showPw2: false }">

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">New Password</label>
          <div class="relative">
            <input :type="showPw ? 'text' : 'password'" name="password" required minlength="6"
                   class="input-field" style="padding-right:3rem" placeholder="Min. 6 characters">
            <button type="button" @click="showPw = !showPw"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
              <svg x-show="!showPw" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg x-show="showPw" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Confirm New Password</label>
          <div class="relative">
            <input :type="showPw2 ? 'text' : 'password'" name="confirm_password" required
                   class="input-field" style="padding-right:3rem" placeholder="Repeat your password">
            <button type="button" @click="showPw2 = !showPw2"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
              <svg x-show="!showPw2" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              <svg x-show="showPw2" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary">Update Password</button>
      </form>

    </div>

    <p class="mt-6 text-center text-sm text-slate-500">
      <a href="{{ url_for('auth.login') }}" class="font-bold text-sky-500 hover:text-sky-600 transition">← Back to Sign In</a>
    </p>

  </div>
</body>
</html>
